<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"Dra. Aisha Wenzinger – Geriatria em Casa e em Consultório"</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* CSS EXTRA PARA ORGANIZAR A NAV E DAR DESTAQUE SIMPLES */
        .main-nav ul {
            display: flex;
            align-items: center;
            gap: 20px; /* Espaço entre os links */
            list-style: none;
            margin: 0;
            padding: 0;
        }

        /* Destaque Simples para a Ficha */
        .ficha-link {
            color: #2ADCA1; /* Verde da marca */
            font-weight: 700;
            text-decoration: none;
            border: 1px solid #2ADCA1;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        /* HOVER SUAVE */
        .ficha-link:hover {
            background-color: rgba(42, 220, 161, 0.1);
        }

        /* --- ALTERAÇÃO SOLICITADA: BOTÕES DA HOME PEQUENOS E LADO A LADO --- */
        
        /* Container para alinhar lado a lado */
        .botoes-hero {
            display: flex;
            gap: 10px; /* Espaço pequeno entre eles */
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap; /* Permite quebrar linha em telas muito pequenas para não vazar */
        }

        /* Estilo específico para deixar ESTES botões menores e minimalistas */
        .botoes-hero .btn-agendar {
            padding: 8px 15px; /* Padding reduzido para ficar menor */
            font-size: 0.85rem; /* Fonte menor */
            font-weight: 600; /* Peso um pouco menor */
            white-space: nowrap; /* Tenta manter em uma linha */
            /* As outras propriedades (cor de fundo, raio da borda) são herdadas do css/style.css original */
        }

        /* AJUSTE PARA O CABEÇALHO GRANDE NÃO COBRIR O CONTEÚDO */
        .sobre {
            padding-top: 150px !important;
        }

        /* Ajuste para não quebrar no celular a navegação */
        @media (max-width: 900px) {
            .main-nav ul { flex-direction: column; gap: 15px; }
        }
        
        /* Ajuste opcional para centralizar os botões pequenos no celular */
        @media (max-width: 600px) {
             .botoes-hero {
                 justify-content: center;
            }
        }
    </style>
</head>
